name: PermitGraph

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run PermitGraph
        uses: ./
        with:
          path: .
          exclude: |
            tests/fixtures/**
          artifact-name: permitgraph-${{ github.run_id }}
          sarif: "true"
